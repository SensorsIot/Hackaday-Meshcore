[platformio]
boards_dir = ../../boards

; Verifies the keymap layer by compiling the REAL variant driver
; (variants/hackaday_communicator/TCA8418Keyboard.cpp) and echoing every
; decoded KeyEvent over serial. Type on the badge keyboard and watch the
; CHAR/FUNCTION/NAV output to confirm the matrix + shift handling.
[env:keymap_verify]
platform = espressif32@6.5.0
framework = arduino
board = hackaday_communicator
monitor_speed = 115200
build_flags =
  -D PIN_I2C_SDA=47
  -D PIN_I2C_SCL=14
  -D PIN_KB_INT=13
  -D PIN_KB_RST=48
  -D TCA8418_KB_ADDR=0x34
  -I ../../variants/hackaday_communicator
build_src_filter =
  +<*>
  +<../../../variants/hackaday_communicator/TCA8418Keyboard.cpp>
