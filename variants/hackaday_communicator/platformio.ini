[hackaday_communicator]
extends = esp32_base
; Custom board JSON: ESP32-S3-WROOM-1-N16R8 (16 MB DIO flash + 8 MB OPI
; PSRAM), matching the SPIRAM_OCT-16 module Hackaday ships. DIO flash
; mode is required — the ROM bootloader reports "mode:DIO" on the badge
; and QIO triple-faults the 2nd-stage bootloader.
board = hackaday_communicator
extra_scripts =
  pre:variants/hackaday_communicator/patch_arduino_gfx.py
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/hackaday_communicator
  ; badge_chat app (forked main.cpp + BadgeUITask). It reuses
  ; companion_radio's MyMesh/DataStore/NodePrefs/AbstractUITask headers,
  ; so that dir is on the include path too.
  -I examples/badge_chat
  -I examples/companion_radio
  -D HACKADAY_COMMUNICATOR
  ; BOARD_HAS_PSRAM, ARDUINO_USB_MODE=1, ARDUINO_USB_CDC_ON_BOOT=1 come
  ; from the board JSON's extra_flags — no need to duplicate here.
  ; Display (NV3007, HSPI)
  -D DISPLAY_CLASS=NV3007Display
  -D NV3007_WIDTH=428
  -D NV3007_HEIGHT=142
  -D PIN_TFT_BL=2
  -D PIN_TFT_DC=39
  -D PIN_TFT_CS=41
  -D PIN_TFT_RST=40
  -D PIN_TFT_SCK=38
  -D PIN_TFT_MOSI=21
  ; Keyboard (TCA8418, I2C). PIN_KB_RST is the TCA8418 /RESET line —
  ; must be pulsed low->high in begin() or SDA stays held low.
  -D PIN_I2C_SDA=47
  -D PIN_I2C_SCL=14
  -D PIN_KB_INT=13
  -D PIN_KB_RST=48
  -D TCA8418_KB_ADDR=0x34
  ; LoRa (SX1262)
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D P_LORA_SCLK=8
  -D P_LORA_MISO=9
  -D P_LORA_MOSI=3
  -D P_LORA_NSS=17
  -D P_LORA_RESET=18
  -D P_LORA_DIO_1=16
  -D P_LORA_BUSY=15
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  ; Sensors — none populated on the badge
  -D ENV_INCLUDE_GPS=0
  -D ENV_INCLUDE_AHTX0=0
  -D ENV_INCLUDE_BME280=0
  -D ENV_INCLUDE_BMP280=0
  -D ENV_INCLUDE_SHTC3=0
  -D ENV_INCLUDE_SHT4X=0
  -D ENV_INCLUDE_LPS22HB=0
  -D ENV_INCLUDE_INA3221=0
  -D ENV_INCLUDE_INA219=0
  -D ENV_INCLUDE_INA226=0
  -D ENV_INCLUDE_INA260=0
  -D ENV_INCLUDE_MLX90614=0
  -D ENV_INCLUDE_VL53L0X=0
  -D ENV_INCLUDE_BME680=0
  -D ENV_INCLUDE_BMP085=0
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/hackaday_communicator>
  +<helpers/sensors/EnvironmentSensorManager.cpp>
  ; BLE companion interface (selected when BLE_PIN_CODE is defined).
  +<helpers/esp32/SerialBLEInterface.cpp>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}
  ; v1.6.1 is the last release that supports both NV3007 and Arduino-
  ; ESP32 v2.x (platform-espressif32 6.x). v1.6.2+ requires v3.x via
  ; esp32-hal-periman.h.
  moononournation/GFX Library for Arduino @ 1.6.1

[env:hackaday_communicator]
extends = hackaday_communicator
build_flags =
  ${hackaday_communicator.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; BLE companion (FSD §11). Selects SerialBLEInterface (built-in
  ; Arduino-ESP32 BLE) over USB serial. A static PIN (not 123456) is used
  ; so no on-screen pairing-PIN screen is needed yet; device advertises as
  ; "MeshCore-<node_name>".
  -D BLE_PIN_CODE=654321
build_src_filter = ${hackaday_communicator.build_src_filter}
  ; badge_chat owns the entry point (main.cpp) and the UI (BadgeUITask).
  +<../examples/badge_chat/*.cpp>
  ; Reuse companion_radio's mesh stack + persistence unchanged. Pull the
  ; specific .cpp files, NOT a glob — its main.cpp must not be compiled
  ; (badge_chat provides ours) and ui-new/ui-orig are excluded entirely.
  +<../examples/companion_radio/MyMesh.cpp>
  +<../examples/companion_radio/DataStore.cpp>
lib_deps =
  ${hackaday_communicator.lib_deps}
  densaugeo/base64 @ ~1.4.0
